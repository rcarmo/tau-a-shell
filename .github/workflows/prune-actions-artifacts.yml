name: Actions storage cleanup

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_run:
    workflows:
      - "Release Tau Prime"
      - "Deploy documentation"
    types: [completed]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: actions-storage-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Delete Actions storage older than one day
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete old artifacts, caches, and workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const cutoff = Date.now() - 24 * 60 * 60 * 1000;

            async function remove(label, operation) {
              try {
                await operation();
                return true;
              } catch (error) {
                if (error.status === 404) return true;
                core.warning(`${label}: ${error.message}`);
                return false;
              }
            }

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );
            let deletedArtifacts = 0;
            for (const artifact of artifacts) {
              if (new Date(artifact.created_at).getTime() >= cutoff) continue;
              if (await remove(`artifact ${artifact.id}`, () =>
                github.rest.actions.deleteArtifact({ owner, repo, artifact_id: artifact.id })
              )) deletedArtifacts++;
            }

            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              { owner, repo, per_page: 100 }
            );
            let deletedCaches = 0;
            for (const cache of caches) {
              const timestamp = cache.last_accessed_at || cache.created_at;
              if (new Date(timestamp).getTime() >= cutoff) continue;
              if (await remove(`cache ${cache.id}`, () =>
                github.rest.actions.deleteActionsCacheById({ owner, repo, cache_id: cache.id })
              )) deletedCaches++;
            }

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100, status: 'completed' }
            );
            let deletedRuns = 0;
            for (const run of runs) {
              if (Number(run.id) === Number(context.runId)) continue;
              if (new Date(run.created_at).getTime() >= cutoff) continue;
              if (await remove(`workflow run ${run.id}`, () =>
                github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id })
              )) deletedRuns++;
            }

            core.notice(
              `Deleted ${deletedArtifacts} artifact(s), ${deletedCaches} cache(s), ` +
              `${deletedRuns} completed workflow run(s) older than 24 hours.`
            );
